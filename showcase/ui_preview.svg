<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Main Background -->
  <rect width="800" height="500" rx="10" fill="#0E1117"/>
  
  <!-- Sidebar -->
  <rect width="250" height="500" rx="10" fill="#262730"/>
  <rect x="20" y="40" width="210" height="40" rx="5" fill="#3B3D4A"/>
  <text x="35" y="65" fill="white" font-family="Arial" font-size="14">⚙️ Download Quality</text>
  
  <rect x="20" y="100" width="210" height="30" rx="5" fill="#4B4E5D"/>
  <text x="35" y="120" fill="white" font-family="Arial" font-size="12">Selected: 1080p (MP4)</text>

  <!-- Main Content Area -->
  <text x="280" y="60" fill="white" font-family="Arial" font-size="24" font-weight="bold">🎥 YouTube Downloader</text>
  
  <!-- URL Input -->
  <rect x="280" y="90" width="480" height="50" rx="5" fill="#262730" stroke="#3B3D4A"/>
  <text x="300" y="122" fill="#808495" font-family="Arial" font-size="14">Enter YouTube URL (Video or Shorts)...</text>
  
  <!-- Video Metadata Card (Simulated) -->
  <rect x="280" y="160" width="480" height="150" rx="10" fill="#3B3D4A" opacity="0.5"/>
  <rect x="300" y="180" width="160" height="90" rx="5" fill="#1A1C23"/>
  <text x="360" y="235" fill="white" font-family="Arial" font-size="14">Thumbnail</text>
  
  <text x="480" y="200" fill="white" font-family="Arial" font-size="16" font-weight="bold">Rick Astley - Never Gonna Give You Up</text>
  <text x="480" y="225" fill="#808495" font-family="Arial" font-size="12">Channel: Rick Astley | Duration: 3:32</text>
  
  <!-- Progress Bar -->
  <rect x="280" y="340" width="480" height="10" rx="5" fill="#262730"/>
  <rect x="280" y="340" width="300" height="10" rx="5" fill="#FF4B4B"/>
  <text x="280" y="370" fill="white" font-family="Arial" font-size="14">🚀 Downloading: 62% Complete...</text>
  
  <!-- Log -->
  <rect x="280" y="400" width="480" height="60" rx="5" fill="#1A1C23"/>
  <text x="295" y="425" fill="#00FF00" font-family="Courier" font-size="12">[INFO] Fetching stream metadata...</text>
  <text x="295" y="445" fill="#00FF00" font-family="Courier" font-size="12">[INFO] Invoking yt-dlp surgical extraction...</text>
